services:
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=somvanshi_crm
      - JWT_SECRET=${JWT_SECRET:-somvanshi-crm-secret-key-2024}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - crm_network

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:5000}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - crm_network

volumes:
  mongo_data:

networks:
  crm_network:
    driver: bridge
